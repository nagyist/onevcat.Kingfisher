name: test

defaults:
  run:
    shell: bash -eo pipefail {0}

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-tests:
    name: test (Xcode ${{ matrix.xcode }}, ${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - xcode: '16.4'
            runner: macos-15
            destination: 'platform=macOS'
            label: 'macOS'
            cache-key: xcode-16.4-macos
          - xcode: '16.4'
            runner: macos-15
            destination: 'platform=iOS Simulator,name=iPhone 16,OS=18.5'
            label: 'iOS 18.5'
            cache-key: xcode-16.4-ios
          - xcode: '16.4'
            runner: macos-15
            destination: 'platform=tvOS Simulator,name=Apple TV 4K (3rd generation),OS=18.5'
            label: 'tvOS 18.5'
            cache-key: xcode-16.4-tvos
          - xcode: '16.4'
            runner: macos-15
            sdk: watchsimulator
            label: 'watchOS 11.5'
            cache-key: xcode-16.4-watchos

          - xcode: '26.4.1'
            runner: macos-26
            destination: 'platform=macOS'
            label: 'macOS'
            cache-key: xcode-26.4.1-macos
          - xcode: '26.4.1'
            runner: macos-26
            destination: 'platform=iOS Simulator,name=iPhone 17,OS=26.4.1'
            label: 'iOS 26.4.1'
            cache-key: xcode-26.4.1-ios
          - xcode: '26.4.1'
            runner: macos-26
            destination: 'platform=tvOS Simulator,name=Apple TV 4K (3rd generation),OS=26.4'
            label: 'tvOS 26.4'
            cache-key: xcode-26.4.1-tvos
          - xcode: '26.4.1'
            runner: macos-26
            sdk: watchsimulator
            label: 'watchOS 26.4'
            cache-key: xcode-26.4.1-watchos
    steps:
      - uses: actions/checkout@v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - name: Run tests
        env:
          DESTINATION: ${{ matrix.destination }}
          SDK: ${{ matrix.sdk }}
          DERIVED_DATA_PATH: build/DerivedData/${{ matrix.cache-key }}
          XCODE_VERSION: ${{ matrix.xcode }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: '60'
          FASTLANE_XCODEBUILD_SETTINGS_RETRIES: '4'
        run: bundle exec fastlane test_ci
